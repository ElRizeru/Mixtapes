<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <dir>~/AppData/Local/Microsoft/Windows/Fonts</dir>
  <dir>WINDOWSFONTDIR</dir>
  <cachedir>LOCAL_APPDATA_FONTCONFIG_CACHE</cachedir>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Adwaita Sans Text</family>
      <family>Adwaita Sans</family>
      <family>Segoe UI Variable</family>
      <family>Segoe UI</family>
      <family>Arial</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Adwaita Serif</family>
      <family>Cambria</family>
      <family>Georgia</family>
      <family>Times New Roman</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Adwaita Mono</family>
      <family>Cascadia Mono</family>
      <family>Consolas</family>
      <family>Courier New</family>
    </prefer>
  </alias>
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>none</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

</fontconfig>
